name: Positives Reminder Cron

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dispatch-reminders:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Dispatch scheduled reminder triggers
        run: |
          curl --fail --show-error --silent \
            --request GET \
            --max-time 60 \
            --header "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://positives.life/api/cron/reminders"
